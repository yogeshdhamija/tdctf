RRRRRRRRRR....XX....BBBBBBBBBB
RRRRRRRRRR...XXXX...BBBBBBBBBB
1RRRRRRRRR..........BBBBBBBBB2
RRRRRRRRRR...XXXX...BBBBBBBBBB
RRRRRRRRRR....XX....BBBBBBBBBB
