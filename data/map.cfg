# Map for tdctf. Dot-matrix monospace grid: each character = one cell.
#
# Cell symbols:
#   .   neutral zone (walkable, either player builds)
#   R   red zone   (RED-only build)
#   B   blue zone  (BLUE-only build)
#   X   debris (impassable, no building)
#   1   red spawn       (neutral)
#   2   blue spawn      (neutral)
#   [   red receptacle  (red zone)
#   ]   blue receptacle (blue zone)
#   r   red flag start  (red zone)
#   b   blue flag start (blue zone)
#
# Grid starts with `grid` on its own line; every non-blank line below is a row.
# All rows must be the same length; exactly one of each landmark (1 2 [ ] r b).

