# Map for tdctf. The grid is a dot-matrix monospace layout: each character
# of each row corresponds to exactly one cell.
#
# Cell symbols:
#   .   neutral zone (walkable, both players can build here)
#   R   red zone (only RED can build)
#   B   blue zone (only BLUE can build)
#   X   debris (impassable, no building)
#   1   red spawn point      (zone: neutral)
#   2   blue spawn point     (zone: neutral)
#   [   red receptacle       (zone: red)
#   ]   blue receptacle      (zone: blue)
#   r   red flag start       (zone: red)
#   b   blue flag start      (zone: blue)
#
# The grid section begins with the keyword `grid` on its own line; every
# subsequent non-blank line is a row of the grid. All rows must be the same
# length. Exactly one of each landmark symbol (1, 2, [, ], r, b) must appear.

# funky map
grid
rRRRRRRRRR....XX....BBBBBBBBBb
RRRRRRRRRR....XX....BBBBBBBBBB
RRRRRRRRRR....XX....BBBBBBBBBB
RRRRRRRRRR....XX....BBBBBBBBBB
