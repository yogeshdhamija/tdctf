  code              S
  name              Slammer
  upgrade_cost      50
  upgrade_build     1
  upgrade_hp_bonus  20
  level1.dmg        5
  level1.range      3
  level1.aoe        1
  level1.slow       2
  level1.cooldown   3
  level2.dmg        8
  level2.range      3
  level2.aoe        2
  level2.slow       2
  level2.cooldown   3

