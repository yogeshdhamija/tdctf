# Tower stats and per-level upgrades.
#
# Format:
#   - '#' starts a comment to end-of-line. Blank lines are ignored.
#   - 'tower <ID>' starts a section. <ID> must match a TowerType in
#     src/game/game.h (BLOCKER, GUNNER, SLAMMER, RESOURCE).
#   - Inside a section, lines are '<key> <value>'. Whitespace between
#     key and value is arbitrary. Keys not listed default to 0/empty.
#
# Keys per section:
#   cost              resources to place
#   hp                starting / level-1 max HP
#   build_turns       turns the tower is "under construction" after placement
#                     (no attack during construction)
#   code              one-character glyph drawn on the grid
#   name              display name (up to 15 chars)
#   upgrade_cost      resources to upgrade level 1 -> level 2
#   upgrade_build     turns the tower is "upgrading" after the buy
#                     (acts at level-1 stats until done)
#   upgrade_hp_bonus  max HP added when the upgrade completes
#   levelN.dmg        damage per attack (N = 1 or 2)
#   levelN.range      attack range in cells (Manhattan distance)
#   levelN.aoe        AoE radius (0 = single target)
#   levelN.slow       ticks of slow applied on hit
#   levelN.cooldown   ticks between attacks
#   levelN.income     resources/turn generated by the tower at level N
#                     (RESOURCE tower only — others leave this at 0)

tower BLOCKER
  cost              20
  hp                100
  build_turns       1
  code              B
  name              Blocker
  upgrade_cost      20
  upgrade_build     1
  upgrade_hp_bonus  20

tower GUNNER
  cost              30
  hp                50
  build_turns       0
  code              G
