# Tower stats. Towers are defined entirely by this file — adding a new
# tower here exposes it in the placement palette automatically.
#
# Sections:
#   tower <ID>          identity block for tower <ID>
#   level <ID> <N>      level-N block for tower <ID> (must be declared
#                       AFTER the tower section, and levels must be
#                       sequential: 1, 2, 3, ...)
#
# Tower keys (inside `tower <ID>`):
#   code  one-character glyph drawn on the grid
#   name  display name (up to 15 chars; must be a single token)
#
# Level keys (inside `level <ID> <N>`). Each level is independent — it
# fully redefines the tower's stats at that level, with no inheritance.
#   cost         resources paid to enter this level (placement for L1,
#                upgrade-from-L(N-1) for L(N>1))
#   hp           absolute max HP at this level (refilled on entry)
#   build_turns  construction time when entering this level; during this
#                time the tower still acts at its previous level's stats
#                (or doesn't exist yet, for level 1)
#   dmg          damage per attack (0 = no attack)
#   range        attack range in cells, Manhattan distance (0 = no attack)
#   aoe          AoE radius around the hit cell (0 = single target)
#   slow         ticks of slow applied on hit (0 = no slow)
#   cooldown     ticks between attacks
#   income       resources/turn generated while this tower is at this level
#   crit_chance  percent (0-100) chance a given attack uses crit_dmg instead
#                of dmg. Rolled once per attack; AoE applies the rolled value
#                to all targets uniformly.
#   crit_dmg     damage substituted for `dmg` on a successful crit roll.
#                Ignored when crit_chance is 0.
#
# Any tower can have any combination of features: a single tower can damage,
# AoE, slow, AND generate income if its level stats are set that way.
# Unspecified keys default to 0.

# ── Blocker ────────────────────────────────────────────────
# Cheap, instant, no attack. The mazing tool: spam these to reshape the
# enemy's path, manufacture a blind spot, or wall off a corridor. Dies
# easily to siege creeps — that's the point. Costs almost nothing, so
# losing one is fine; the lost time on the enemy creeps is the value.

tower BLOCKER
  code  B
  name  Blocker

level BLOCKER 1
  cost         8
  hp           60
  build_turns  0

# ── Gunner ─────────────────────────────────────────────────
# Single-target damage that scales hard with level. L1 chips, L2 is a
# real threat, L3 is the "sniper" — 4-turn build but headshots almost
# anything in a huge radius. The L3 path is the long-investment payoff
# the design doc calls out (Scenario B). While upgrading, the tower is
# silent — committing to L3 means 4 turns of reduced firepower at that
# spot.

tower GUNNER
  code  G
  name  Gunner

level GUNNER 1
  cost         25
  hp           60
  build_turns  1
  dmg          8
  range        3
  cooldown     2

level GUNNER 2
  cost         70
  hp           120
  build_turns  2
  dmg          25
  range        5
  cooldown     2

level GUNNER 3
  cost         140
  hp           200
  build_turns  4
  dmg          80
  range        7
  cooldown     3
  crit_chance  20
  crit_dmg     200

# ── Splasher ───────────────────────────────────────────────
# AoE damage plus a hard freeze (slow ticks = ticks the creep stands
# still). Pairs with Gunner: Splasher locks the wave in place, Gunner
# picks them off. Weak against single tough creeps (Bruiser shrugs off
# the chip damage), strong against Swarm and Retriever spam.

tower SPLASHER
  code  S
  name  Splasher

level SPLASHER 1
  cost         40
  hp           60
  build_turns  1
  dmg          5
  range        3
  aoe          1
  slow         2
  cooldown     3

level SPLASHER 2
  cost         100
  hp           100
  build_turns  2
  dmg          12
  range        4
  aoe          2
  slow         3
  cooldown     3

# ── Resource ───────────────────────────────────────────────
# The economic engine. With zero baseline income, every player needs
# at least one of these — or has to break the opponent before turn ~6.
# Slow to build, low HP at L1: an early R-tower is a real commitment
# (3 silent turns) and vulnerable to a siege rush. L2 is a late-game
# snowball: if you're upgrading R-towers, you're already winning.

tower RESOURCE
  code  R
  name  Resource

level RESOURCE 1
  cost         50
  hp           40
  build_turns  1
  income       20
