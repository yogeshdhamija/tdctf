# Tower stats. Adding a tower here exposes it in the placement palette.
#
# Sections:
#   tower <ID>          identity block.
#   level <ID> <N>      level-N stats; must follow the tower section,
#                       levels sequential (1, 2, 3, ...).
#
# Tower keys:
#   code  one-char glyph on the grid.
#   name  display name (single token, up to 15 chars).
#
# Level keys (defaults 0). Each level fully redefines stats — no inheritance.
#   cost         resources to enter this level (place at L1, upgrade at L>1).
#   hp           max HP at this level (refilled on entry).
#   build_turns  construction time; during build the tower acts at its
#                previous level's stats (or doesn't exist for L1).
#   dmg          damage per attack (0 = no attack).
#   range        attack range in cells, Manhattan (0 = no attack).
#   aoe          AoE radius around the hit cell (0 = single target).
#   slow         ticks of slow applied on hit.
#   cooldown     ticks between attacks.
#   income       resources/turn generated at this level.
#   crit_chance  percent (0-100) an attack uses crit_dmg instead of dmg.
#                Rolled once per attack; AoE applies the rolled value uniformly.
#   crit_dmg     damage substituted on a crit roll. Ignored if crit_chance=0.
#   vision       fog-of-war radius (Chebyshev); 0 = own cell only. Towers
#                mid-construction provide no vision.
#
# Any tower can mix any features (damage, AoE, slow, income).

# Blocker — cheap, instant, no attack. Mazing tool to reshape enemy path.
tower BLOCKER
  code  B
  name  Blocker

level BLOCKER 1
  cost         8
  hp           60
  build_turns  0
  vision       1

# Gunner — single-target damage scaling hard with level. L3 is the long-build sniper.
tower GUNNER
  code  G
  name  Gunner

level GUNNER 1
  cost         25
  hp           60
  build_turns  0
  dmg          8
  range        3
  cooldown     2
  vision       3

level GUNNER 2
  cost         70
  hp           120
  build_turns  2
  dmg          25
  range        5
  cooldown     2
  vision       5

level GUNNER 3
  cost         140
  hp           200
  build_turns  4
  dmg          80
  range        7
  cooldown     3
  crit_chance  20
  crit_dmg     200
  vision       7

# Splasher — AoE damage plus hard freeze. Pairs with Gunner; weak vs single tough creeps.
tower SPLASHER
  code  S
  name  Splasher

level SPLASHER 1
  cost         40
  hp           60
  build_turns  0
  dmg          5
  range        3
  aoe          1
  slow         2
  cooldown     3
  vision       3

level SPLASHER 2
  cost         100
  hp           100
  build_turns  2
  dmg          12
  range        4
  aoe          2
  slow         3
  cooldown     3
  vision       4

# Resource — income engine. Slow build, fragile L1; required to scale past turn ~6.
tower RESOURCE
  code  R
  name  Resource

level RESOURCE 1
  cost         50
  hp           40
  build_turns  3
  income       20
  vision       2
