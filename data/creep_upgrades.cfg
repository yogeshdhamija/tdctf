# Creep types and creep upgrades.
#
# Sections:
#   creep <ID>      declares a creep type (identifier only; all stats come
#                   from the upgrade(s) currently active for the type).
#   upgrade <ID>    researchable item in the planning sidebar; carries the
#                   creep profile that takes effect when research completes.
#
# Merge semantic: for each creep type, the active profile is an overlay of
# every completed upgrade targeting that type, in declaration order. Each
# upgrade contributes only the fields it explicitly sets; unset fields
# inherit from prior overlays; later upgrade wins on conflict.
#
# Upgrade keys (defaults 0/empty):
#   cost            resources to start research.
#   research_turns  turns before activation.
#   creep           target creep type ID (required when count > 0).
#   count           creeps spawned per turn once active.
#   code            one-char glyph in the per-cell crowding badge.
#   hp              spawn HP.
#   can_carry_flag  1 = picks up enemy flag on contact.
#   melee_damage    damage/tick to any adjacent enemy tower. Independent
#                   of can_carry_flag.
#   spawn_order     spawn-queue sort key (lower first; ties = declaration
#                   order). One creep per tick — wave forms a procession.
#   vision          fog-of-war radius (Chebyshev); 0 = own cell only.
#   requires        prerequisite upgrade ID (must be declared earlier; no
#                   forward references).
#   description     sidebar label, may contain spaces (up to 63 chars).

# Creep roles: SWARM cheap/fragile/numbers, ATTACKER melee tower damage,
# TANK soaks fire and leads the wave, SCOUT recon (no flag, double vision).
# Spawn order: tank → swarm → attacker → scout.

creep SWARM
creep ATTACKER
creep TANK
creep SCOUT

# Each tree opens with "+1 <type>" defining the full profile; follow-on
# upgrades restate only the field they change and inherit the rest.

upgrade SWARM_1
  cost            20
  research_turns  1
  creep           SWARM
  count           1
  code            s
  hp              12
  can_carry_flag  1
  spawn_order     2
  vision          2
  description     +1 Swarm

upgrade SWARM_2X
  cost            60
  research_turns  2
  creep           SWARM
  count           2
  requires        SWARM_1
  description     Double the swarm

upgrade SWARM_4X
  cost            60
  research_turns  2
  creep           SWARM
  count           4
  requires        SWARM_2X
  description     Double the swarm

upgrade SWARM_8X
  cost            60
  research_turns  2
  creep           SWARM
  count           8
  requires        SWARM_4X
  description     Double the swarm

