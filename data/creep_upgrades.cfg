# Creep upgrades. Each upgrade is declared in this file in the order it
# appears in the planning-phase sidebar. Per docs/game-design.md §7-8: each
# upgrade either spawns additional creeps each turn or enhances existing
# creeps; for the MVP only the "spawn additional creeps" form is supported.
#
# Section:
#   upgrade <ID>     identity block for an upgrade. <ID> is a single token
#                    (uppercase by convention).
#
# Keys (inside `upgrade <ID>`):
#   cost            resources paid to start research
#   research_turns  turns of research before the upgrade activates
#   add_retrievers  retrievers spawned per turn after activation (default 0)
#   add_siege       siege creeps spawned per turn after activation (default 0)
#   description     human-readable label shown in the sidebar. Unlike other
#                   values, this consumes the rest of the line and may
#                   contain spaces. Up to 63 characters.
#
# Unspecified keys default to 0 / empty.

upgrade RETRIEVER_1
  cost            30
  research_turns  1
  add_retrievers  1
  description     +1 Retriever

upgrade SIEGE_2
  cost            40
  research_turns  1
  add_siege       2
  description     +2 Siege

upgrade RETRIEVER_2X
  cost            60
  research_turns  2
  add_retrievers  2
  description     +2 Retrievers

upgrade SIEGE_2_II
  cost            70
  research_turns  2
  add_siege       2
  description     +2 Siege II
