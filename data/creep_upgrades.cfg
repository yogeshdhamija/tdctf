# Creep types and creep upgrades. Two section kinds:
#
#   creep <ID>      declares a creep type. The section header is the whole
#                   declaration — types are just identifiers. All behavior
#                   (HP, glyph, flag-carry, melee, spawn order, count) is
#                   defined by the upgrade that's currently active for the
#                   type.
#   upgrade <ID>    a researchable item shown in the planning sidebar. The
#                   upgrade carries the full creep profile that takes
#                   effect for the targeted type when this upgrade
#                   completes.
#
# Merge semantic: at simulation start, for each creep type and each
# player, the active profile is the result of overlaying every
# completed upgrade targeting that type, in declaration order. Each
# upgrade contributes only the fields it explicitly sets — unspecified
# fields inherit from the previously-active overlay. Two upgrades that
# set the same field: the later-declared wins for that field. Two
# upgrades with disjoint fields combine (e.g. one sets hp+melee_damage,
# a later one sets hp only → final hp is the latter's, melee_damage is
# the former's).
#
# Upgrade keys (inside `upgrade <ID>`):
#   cost            resources paid to start research.
#   research_turns  turns of research before the upgrade activates.
#   creep           <CREEP_ID> — target type whose profile this upgrade
#                   defines. Required if `count` > 0.
#   count           creeps of `creep` spawned per turn once active.
#                   Default 0 (an upgrade with count=0 contributes nothing
#                   to the spawn queue but can still serve as a stat
#                   placeholder for future global-buff upgrades).
#   code            one-character glyph used in the per-cell crowding
#                   badge (e.g. "2R" for two retrievers).
#   hp              starting HP of a spawned creep.
#   can_carry_flag  1 = picks up the enemy flag on contact (default 0).
#   melee_damage    damage dealt per tick to any adjacent enemy tower
#                   (default 0). A creep can have both can_carry_flag
#                   and melee_damage > 0 — independent behaviors.
#   spawn_order     sort key for the per-turn spawn queue. Lower numbers
#                   spawn first; ties preserve declaration order.
#                   Default 0. Creeps spawn one per sim tick, so the
#                   wave forms a procession down the path.
#   description     sidebar label; consumes the rest of the line and may
#                   contain spaces. Up to 63 characters.
#
# Unspecified keys default to 0 / empty.

# ── Creep types ────────────────────────────────────────────
# Four roles. Identifiers only — the upgrade ladder below defines what
# each type actually does. Retrievers are baseline flag-stealers.
# Bruisers are tankier flag-carriers — they soak damage and pull tower
# fire so the rest of the wave gets through. Sieges can't carry but
# melee enemy towers; the answer to a stacked defense. Swarms are tiny
# disposable bodies — cheap pressure, AoE bait, chip throughput.

creep BRUISER
creep SIEGE
creep RETRIEVER
creep SWARM

# ── Upgrade research ladder ────────────────────────────────
# Each ladder upgrade below restates the full creep profile for its
# target type, so completing a later tier (e.g. STRIKE_FORCE) cleanly
# replaces the earlier tier's count (no 1+2+3 stacking). A future
# "stat-buff only" upgrade could set just a field or two (e.g.
# hp 50) — the merge layer would keep the previously-active count and
# other stats, applying only the changed field.
#
# Pacing target: Turn 1 lets a player afford one cheap upgrade and
# still have room for a Blocker or two; the 100-resource start makes
# every Turn-1 choice a real commitment. Mid-tier upgrades (Bruiser,
# Wrecking Crew) require saving across turns OR running a Resource
# tower. Top-tier upgrades are late-game compounders.

upgrade RECRUIT
  cost            20
  research_turns  1
  creep           RETRIEVER
  count           1
  code            r
  hp              25
  can_carry_flag  1
  spawn_order     3
  description     +1 Retriever

upgrade SIEGE_TEAM
  cost            40
  research_turns  2
  creep           SIEGE
  count           1
  code            s
  hp              50
  melee_damage    6
  spawn_order     2
  description     +1 Siege

