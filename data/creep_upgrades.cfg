# Creep types and creep upgrades. Two section kinds:
#
#   creep <ID>      declares a creep type. The section header is the whole
#                   declaration — types are just identifiers. All behavior
#                   (HP, glyph, flag-carry, melee, spawn order, count) is
#                   defined by the upgrade that's currently active for the
#                   type.
#   upgrade <ID>    a researchable item shown in the planning sidebar. The
#                   upgrade carries the full creep profile that takes
#                   effect for the targeted type when this upgrade
#                   completes.
#
# Merge semantic: at simulation start, for each creep type and each
# player, the active profile is the result of overlaying every
# completed upgrade targeting that type, in declaration order. Each
# upgrade contributes only the fields it explicitly sets — unspecified
# fields inherit from the previously-active overlay. Two upgrades that
# set the same field: the later-declared wins for that field. Two
# upgrades with disjoint fields combine (e.g. one sets hp+melee_damage,
# a later one sets hp only → final hp is the latter's, melee_damage is
# the former's).
#
# Upgrade keys (inside `upgrade <ID>`):
#   cost            resources paid to start research.
#   research_turns  turns of research before the upgrade activates.
#   creep           <CREEP_ID> — target type whose profile this upgrade
#                   defines. Required if `count` > 0.
#   count           creeps of `creep` spawned per turn once active.
#                   Default 0 (an upgrade with count=0 contributes nothing
#                   to the spawn queue but can still serve as a stat
#                   placeholder for future global-buff upgrades).
#   code            one-character glyph used in the per-cell crowding
#                   badge (e.g. "2R" for two retrievers).
#   hp              starting HP of a spawned creep.
#   can_carry_flag  1 = picks up the enemy flag on contact (default 0).
#   melee_damage    damage dealt per tick to any adjacent enemy tower
#                   (default 0). A creep can have both can_carry_flag
#                   and melee_damage > 0 — independent behaviors.
#   spawn_order     sort key for the per-turn spawn queue. Lower numbers
#                   spawn first; ties preserve declaration order.
#                   Default 0. Creeps spawn one per sim tick, so the
#                   wave forms a procession down the path.
#   vision          fog-of-war vision radius (Chebyshev) of a spawned
#                   creep of this type. Default 0 = own cell only.
#                   Merges like every other profile field — later
#                   completed upgrades setting `vision` win.
#   requires        <UPGRADE_ID> — prerequisite upgrade. The buy button
#                   is locked until the named upgrade has finished
#                   researching. The referenced upgrade must be declared
#                   earlier in this file (no forward references). Default
#                   none.
#   description     sidebar label; consumes the rest of the line and may
#                   contain spaces. Up to 63 characters.
#
# Unspecified keys default to 0 / empty.

# ── Creep types ────────────────────────────────────────────
# Three roles, all flag-carriers. Swarm is a cheap, fragile body —
# pressure through numbers. Attacker brings melee damage to chew
# through towers. Tank soaks fire so the wave reaches the flag.
# Spawn order is tank → swarm → attacker so the tanks step out
# first to draw fire, the swarm pours through behind them, and
# attackers trail to crack any towers still standing.

creep SWARM
creep ATTACKER
creep TANK
creep SCOUT

# ── Upgrade research ladder ────────────────────────────────
# Each tree starts with a "+1 <type>" upgrade that defines the full
# profile (count, code, hp, can_carry_flag, melee_damage, spawn_order)
# for that type. The follow-on doublings only restate the single field
# they change — count for swarm, melee_damage for attacker, hp for
# tank — and inherit the rest from the previous overlay via the merge
# semantic above. Each doubling is gated on the previous one.

upgrade SWARM_1
  cost            20
  research_turns  1
  creep           SWARM
  count           1
  code            w
  hp              12
  can_carry_flag  1
  spawn_order     2
  vision          2
  description     +1 Swarm

upgrade SWARM_2X
  cost            60
  research_turns  2
  creep           SWARM
  count           2
  requires        SWARM_1
  description     Double the swarm

upgrade SWARM_4X
  cost            60
  research_turns  2
  creep           SWARM
  count           4
  requires        SWARM_2X
  description     Double the swarm

upgrade SWARM_8X
  cost            60
  research_turns  2
  creep           SWARM
  count           8
  requires        SWARM_4X
  description     Double the swarm

upgrade ATTACKER_1
  cost            50
  research_turns  2
  creep           ATTACKER
  count           1
  code            a
  hp              40
  can_carry_flag  1
  melee_damage    10
  spawn_order     3
  vision          2
  description     +1 Attacker

upgrade ATTACKER_DMG_2X
  cost            70
  research_turns  2
  creep           ATTACKER
  melee_damage    20
  requires        ATTACKER_1
  description     Double the damage

upgrade ATTACKER_DMG_4X
  cost            110
  research_turns  3
  creep           ATTACKER
  melee_damage    40
  requires        ATTACKER_DMG_2X
  description     Double the damage

upgrade ATTACKER_DMG_8X
  cost            170
  research_turns  3
  creep           ATTACKER
  melee_damage    80
  requires        ATTACKER_DMG_4X
  description     Double the damage

upgrade TANK_1
  cost            80
  research_turns  2
  creep           TANK
  count           1
  code            t
  hp              80
  can_carry_flag  1
  spawn_order     1
  vision          2
  description     +1 Tank

upgrade TANK_HP_2X
  cost            90
  research_turns  3
  creep           TANK
  hp              160
  requires        TANK_1
  description     Double the health

upgrade TANK_HP_4X
  cost            130
  research_turns  3
  creep           TANK
  hp              320
  requires        TANK_HP_2X
  description     Double the health

upgrade TANK_HP_8X
  cost            190
  research_turns  4
  creep           TANK
  hp              640
  requires        TANK_HP_4X
  description     Double the health

# ── Scout ──────────────────────────────────────────────────
# Specialised recon unit per game-design.md §8. Cheap, fragile, and
# wanders the front with double the vision radius of normal creeps,
# illuminating enemy territory so the next planning phase can react.

upgrade SCOUT_1
  cost            30
  research_turns  1
  creep           SCOUT
  count           1
  code            s
  hp              8
  spawn_order     0
  vision          6
  description     +1 Scout
