# Creep types and creep upgrades. Two section kinds:
#
#   creep <ID>      defines a creep type and its behaviors. Referenced by
#                   upgrades through the `spawn` directive.
#   upgrade <ID>    a researchable item shown in the planning sidebar.
#                   When completed, spawns a configurable count of one
#                   creep type each turn.
#
# Creep type keys (inside `creep <ID>`):
#   code            one-character glyph used in the per-cell crowding
#                   badge (e.g. "2R" for two retrievers).
#   hp              starting HP at spawn.
#   can_carry_flag  1 = picks up the enemy flag on contact (default 0).
#   melee_damage    damage dealt per tick to any adjacent enemy tower
#                   (default 0). A creep can have both can_carry_flag
#                   and melee_damage > 0 — these behaviors are independent.
#
# Upgrade keys (inside `upgrade <ID>`):
#   cost            resources paid to start research.
#   research_turns  turns of research before the upgrade activates.
#   spawn           "<CREEP_ID> <N>". After activation, spawns N creeps of
#                   the named type at the player's spawn cell each turn.
#                   Omit entirely for an upgrade that spawns nothing.
#   description     sidebar label; consumes the rest of the line and may
#                   contain spaces. Up to 63 characters.
#
# Unspecified keys default to 0 / empty.

# ── Creep types ────────────────────────────────────────────
# Four roles. Retrievers are the baseline flag-stealers. Bruisers are
# tankier flag-carriers — they soak damage and pull tower fire so the
# rest of the wave gets through. Sieges can't carry but melee enemy
# towers; the answer to a stacked defense. Swarms are tiny disposable
# bodies — cheap pressure, AoE bait, and chip throughput.

creep RETRIEVER
  code            r
  hp              25
  can_carry_flag  1

creep BRUISER
  code            b
  hp              80
  can_carry_flag  1

creep SIEGE
  code            s
  hp              50
  melee_damage    6

creep SWARM
  code            w
  hp              12
  can_carry_flag  1

# ── Upgrade research ladder ────────────────────────────────
# All upgrades stack: each completed research adds its spawn count to
# every subsequent wave, permanently. There's no "tree" yet — buying
# more means more creeps per turn, but the *mix* you choose matters.
#
# Pacing target: Turn 1 lets a player afford one cheap upgrade and
# still have room for a Blocker or two; the 100-resource start makes
# every Turn-1 choice a real commitment. Mid-tier upgrades (Bruiser,
# Wrecking Crew) require saving across turns OR running a Resource
# tower. Top-tier upgrades are late-game compounders.

upgrade RECRUIT
  cost            20
  research_turns  1
  spawn           RETRIEVER 1
  description     +1 Retriever

upgrade SIEGE_TEAM
  cost            40
  research_turns  2
  spawn           SIEGE 1
  description     +1 Siege

upgrade SWARM_TIDE
  cost            55
  research_turns  2
  spawn           SWARM 4
  description     +4 Swarm

upgrade STRIKE_FORCE
  cost            70
  research_turns  2
  spawn           RETRIEVER 2
  description     +2 Retrievers

upgrade BRUISER_SQUAD
  cost            90
  research_turns  3
  spawn           BRUISER 1
  description     +1 Bruiser

upgrade WRECKING_CREW
  cost            120
  research_turns  3
  spawn           SIEGE 2
  description     +2 Siege

upgrade ASSAULT_PACK
  cost            150
  research_turns  3
  spawn           RETRIEVER 3
  description     +3 Retrievers

upgrade ELITE_GUARD
  cost            180
  research_turns  4
  spawn           BRUISER 1
  description     +1 Bruiser
